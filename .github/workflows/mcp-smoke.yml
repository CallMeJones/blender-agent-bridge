name: Build, smoke, release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: extension-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mcp-smoke:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packaging build frontend
        run: python -m pip install build

      - name: Run conventional unit tests
        run: python -m unittest discover -s tests\unit -p "test_*.py" -v

      - name: Compile MCP bridge modules
        run: >
          python -m py_compile
          addon\claude_blender\mcp_server.py
          addon\claude_blender\bridge_protocol.py
          addon\claude_blender\bridge_server.py
          addon\claude_blender\audit_log.py
          addon\claude_blender\script_analysis.py
          scripts\build_extension_zip.py
          scripts\build_extension_repository.py
          scripts\live_workflow_sweep.py
          tests\smoke_audit_log.py
          tests\smoke_build_extension_zip.py
          tests\smoke_extension_repository.py
          tests\smoke_helper_routing.py
          tests\smoke_real_client_routing.py
          tests\smoke_release_artifact_identity.py
          tests\smoke_published_release_identity.py
          tests\smoke_release_consistency.py
          tests\smoke_script_analysis.py
          tests\smoke_mcp_server.py
          tests\smoke_tool_contract_inventory.py

      - name: Run audit log smoke test
        run: python tests\smoke_audit_log.py

      - name: Run bridge protocol validation smoke test
        run: python tests\smoke_bridge_protocol_validation.py

      - name: Run script analysis smoke test
        run: python tests\smoke_script_analysis.py

      - name: Run script analysis bypass probe
        run: python tests\smoke_script_analysis_bypass.py

      - name: Run helper routing smoke test
        run: python tests\smoke_helper_routing.py

      - name: Run context budget smoke test
        run: python tests\smoke_context_budget.py

      - name: Run external asset smoke test
        run: python tests\smoke_external_assets.py

      - name: Run real-client routing smoke test
        run: python tests\smoke_real_client_routing.py

      - name: Run extension build smoke test
        run: python tests\smoke_build_extension_zip.py

      - name: Run extension repository smoke test
        run: python tests\smoke_extension_repository.py

      - name: Run release consistency smoke test
        run: python tests\smoke_release_consistency.py

      - name: Run stdio MCP smoke test
        run: python tests\smoke_mcp_server.py

      - name: Run tool contract inventory smoke test
        run: python tests\smoke_tool_contract_inventory.py

      - name: Build blender-bridge wheel and source distribution
        run: python -m build

      - name: Smoke installed blender-bridge wheel
        shell: pwsh
        run: |
          python -m venv .wheel-smoke
          .\.wheel-smoke\Scripts\python.exe -m pip install --no-index --no-deps (Get-ChildItem dist\blender_bridge-*.whl | Select-Object -First 1).FullName
          $env:BLENDER_BRIDGE_EXECUTABLE = (Resolve-Path .\.wheel-smoke\Scripts\blender-bridge.exe).Path
          .\.wheel-smoke\Scripts\blender-bridge.exe --version
          python -m unittest tests.unit.test_mcp_stdio -v

      - name: Upload blender-bridge Python distributions
        uses: actions/upload-artifact@v7
        with:
          name: blender-bridge-python-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

      - name: Upload tagged blender-bridge publication candidate
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: blender-bridge-official-python-candidate
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

      - name: Build extension zip and GitHub Pages repository
        run: >
          python scripts\build_extension_repository.py
          --build-zip
          --repo-dir public
          --repository-url https://callmejones.github.io/blender-agent-bridge/index.json

      - name: Verify release and Pages archive identity
        run: python tests\smoke_release_artifact_identity.py

      - name: Upload Python-built smoke archive
        uses: actions/upload-artifact@v7
        with:
          name: blender-agent-bridge-python-smoke-archive
          path: |
            dist/*.zip
            dist/*.sha256

      - name: Upload Python-built repository smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: blender-agent-bridge-python-smoke-repository
          path: |
            public/index.json
            public/index.html
            public/*.zip
            public/*.sha256
            public/assets/**

  blender-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        include:
          - blender_series: "4.2"
            blender_version: "4.2.0"
            release_builder: false
          - blender_series: "4.5"
            blender_version: "4.5.0"
            release_builder: false
          - blender_series: "5.1"
            blender_version: "5.1.2"
            release_builder: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Cache Blender
        id: cache-blender
        uses: actions/cache@v6
        with:
          path: blender
          key: blender-${{ matrix.blender_version }}-linux-x64

      - name: Download Blender
        if: steps.cache-blender.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          url="https://download.blender.org/release/Blender${{ matrix.blender_series }}/blender-${{ matrix.blender_version }}-linux-x64.tar.xz"
          echo "Downloading $url"
          curl -fsSL "$url" -o blender.tar.xz
          mkdir -p blender
          tar -xJf blender.tar.xz -C blender --strip-components=1
          rm blender.tar.xz

      - name: Install headless GL dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxi6 libxxf86vm1 libxfixes3 libxrender1 xvfb

      - name: Show Blender version
        run: ./blender/blender --version

      - name: Run Blender smoke suite (complete suite on tags)
        run: |
          set -euo pipefail
          tests=(
            smoke_advanced_helpers
            smoke_refinement_helpers
            smoke_refinement_visual_qa
            smoke_script_runner
            smoke_context_docs
            smoke_ui_layout
          )
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tests=(
              smoke_advanced_helpers
              smoke_agent_tools
              smoke_animation_controls
              smoke_animation_helpers
              smoke_bridge_server
              smoke_context_docs
              smoke_context_planner
              smoke_external_asset_imports
              smoke_full_tool_inventory
              smoke_live_helpers
              smoke_project_files
              smoke_refinement_helpers
              smoke_refinement_visual_qa
              smoke_render_jobs
              smoke_safe_editing_helpers
              smoke_script_runner
              smoke_tool_selection
              smoke_ui_layout
              smoke_world_model
            )
          fi
          for t in "${tests[@]}"; do
            echo "::group::$t"
            out=$(xvfb-run -a ./blender/blender --background --factory-startup --python-exit-code 1 --python "tests/$t.py" 2>&1) || { echo "$out"; echo "::endgroup::"; exit 1; }
            echo "$out"
            echo "$out" | grep -q "$t: ok" || { echo "MISSING SUCCESS SENTINEL for $t"; echo "::endgroup::"; exit 1; }
            echo "::endgroup::"
          done

      - name: Run clean installed-extension live smoke for tags
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          xvfb-run -a python3 scripts/installed_extension_live_smoke.py
          --blender "$GITHUB_WORKSPACE/blender/blender"
          --timeout 240

      - name: Validate and build official tagged archive
        if: startsWith(github.ref, 'refs/tags/v') && matrix.release_builder
        run: |
          set -euo pipefail
          ./blender/blender --command extension validate addon/claude_blender
          python3 scripts/build_extension_zip.py --blender "$GITHUB_WORKSPACE/blender/blender"
          version=$(python3 -c "import tomllib; print(tomllib.load(open('addon/claude_blender/blender_manifest.toml','rb'))['version'])")
          ./blender/blender --command extension validate "dist/claude_blender-${version}.zip"

      - name: Upload official tagged release candidate
        if: startsWith(github.ref, 'refs/tags/v') && matrix.release_builder
        uses: actions/upload-artifact@v7
        with:
          name: blender-agent-bridge-official-release-candidate
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  pypi-preflight:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [mcp-smoke, blender-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Stop before any public deployment if the PyPI name is unavailable
        run: python scripts/check_pypi_name.py

  prepare-publication:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: pypi-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download official release candidate
        uses: actions/download-artifact@v7
        with:
          name: blender-agent-bridge-official-release-candidate
          path: dist

      - name: Build Pages repository from the official archive
        shell: bash
        run: |
          set -euo pipefail
          version=$(python -c "import tomllib; print(tomllib.load(open('addon/claude_blender/blender_manifest.toml','rb'))['version'])")
          python scripts/build_extension_repository.py \
            --zip-path "dist/claude_blender-${version}.zip" \
            --repo-dir public \
            --repository-url https://callmejones.github.io/blender-agent-bridge/index.json
          python tests/smoke_release_artifact_identity.py

      - name: Upload tagged extension repository artifact
        uses: actions/upload-artifact@v7
        with:
          name: blender-agent-bridge-extension-repository-${{ github.ref_name }}
          path: |
            public/index.json
            public/index.html
            public/*.zip
            public/*.sha256
            public/assets/**
          if-no-files-found: error

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy-pages:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prepare-publication, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: prepare-publication
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/blender-bridge/
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download tagged blender-bridge publication candidate
        uses: actions/download-artifact@v7
        with:
          name: blender-bridge-official-python-candidate
          path: dist

      - name: Verify PyPI ownership and tested artifact publication state
        id: pypi-preflight
        run: >
          python scripts/check_pypi_name.py
          --dist-dir dist
          --version "${{ github.ref_name }}"
          --github-output "$GITHUB_OUTPUT"

      - name: Publish blender-bridge with PyPI Trusted Publishing
        if: steps.pypi-preflight.outputs.publish_required == 'true'
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          skip-existing: true

      - name: Verify the complete PyPI artifact set after publication
        run: >
          python scripts/check_pypi_name.py
          --dist-dir dist
          --version "${{ github.ref_name }}"
          --require-complete
          --attempts 12
          --delay 5

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prepare-publication, deploy-pages, publish-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download official release candidate
        uses: actions/download-artifact@v7
        with:
          name: blender-agent-bridge-official-release-candidate
          path: dist

      - name: Download blender-bridge Python distributions
        uses: actions/download-artifact@v7
        with:
          name: blender-bridge-official-python-candidate
          path: python-dist

      - name: Publish tagged GitHub release assets
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.sha256
            python-dist/*.whl
            python-dist/*.tar.gz

  verify-publication:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [deploy-pages, publish-pypi, publish-release]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify public Pages and Release archive identity
        run: python tests/smoke_published_release_identity.py --attempts 30 --delay 5
