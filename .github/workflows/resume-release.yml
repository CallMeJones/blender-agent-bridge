name: Resume tagged release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing immutable release tag, for example v0.4.0
        required: true
        type: string
      source_run_id:
        description: Workflow run containing the exact tested publication artifacts
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-recovery-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  prepare-recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out immutable tagged source
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify source run belongs to the exact tag commit
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$SOURCE_RUN_ID" =~ ^[0-9]+$ ]]
          expected_sha=$(git rev-parse HEAD)
          source_sha=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}" --jq .head_sha)
          source_ref=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}" --jq .head_branch)
          test "$source_sha" = "$expected_sha"
          test "$source_ref" = "$RELEASE_TAG"
          version=$(python -c "import tomllib; print(tomllib.load(open('addon/claude_blender/blender_manifest.toml','rb'))['version'])")
          test "$RELEASE_TAG" = "v${version}"

      - name: Download exact official extension candidate
        uses: actions/download-artifact@v7
        with:
          name: blender-agent-bridge-official-release-candidate
          path: dist
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Download exact Pages repository
        uses: actions/download-artifact@v7
        with:
          name: blender-agent-bridge-extension-repository-${{ inputs.tag }}
          path: public
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Download exact published Python distributions
        uses: actions/download-artifact@v7
        with:
          name: blender-bridge-official-python-candidate
          path: python-dist
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Verify retained artifacts and completed PyPI publication
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          python tests/smoke_release_artifact_identity.py
          python scripts/check_pypi_name.py \
            --dist-dir python-dist \
            --version "$RELEASE_TAG" \
            --require-complete \
            --attempts 6 \
            --delay 5

      - name: Upload fresh GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy-pages:
    needs: prepare-recovery
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-release:
    needs: [prepare-recovery, deploy-pages]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download exact official extension candidate
        uses: actions/download-artifact@v7
        with:
          name: blender-agent-bridge-official-release-candidate
          path: dist
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Download exact published Python distributions
        uses: actions/download-artifact@v7
        with:
          name: blender-bridge-official-python-candidate
          path: python-dist
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Publish tagged GitHub release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.sha256
            python-dist/*.whl
            python-dist/*.tar.gz

  verify-publication:
    needs: [deploy-pages, publish-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out immutable tagged source
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify public Pages and Release archive identity
        run: python tests/smoke_published_release_identity.py --attempts 60 --delay 5
